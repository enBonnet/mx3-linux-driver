# ============================================================================
# MX3 Linux Driver - Default Configuration
# ============================================================================
# Lines starting with # or ; are comments.
# This file is installed to /etc/mx3/config.conf
# User overrides can go in ~/.config/mx3/config.conf
# ============================================================================

# ---------------------------------------------------------------------------
# [general] - Global settings
# ---------------------------------------------------------------------------
[general]
# Timeout in seconds to distinguish a tap from a hold
tap_timeout = 0.2

# Minimum pixels of mouse movement to register as a gesture
motion_threshold = 50

# Minimum button hold time (ms) to trigger a long-press action
default_longpress_ms = 500

# Log verbosity: debug, info, warn, error
log_level = info

# ---------------------------------------------------------------------------
# [device] - Device identification
# ---------------------------------------------------------------------------
[device]
# USB Vendor ID (hex or decimal). 0 = match any
vid = 0x046d

# USB Product ID (hex or decimal). 0 = match any
pid = 0

# Substring to match in the device name (case-insensitive)
device_name = Logitech

# ---------------------------------------------------------------------------
# [button.forward] - BTN_FORWARD gestures
# ---------------------------------------------------------------------------
[button.forward]
event_code = 0x115
motion_threshold = 50

# Tap (no motion): Open app launcher
action.tap.keys = KEY_LEFTMETA
action.tap.description = Tap: Open app launcher (Super)

# Swipe left: Previous workspace (KDE/GNOME default: Super+[)
action.left.keys = KEY_LEFTMETA, KEY_LEFTBRACE
action.left.description = Swipe left: Previous workspace (Super+[)

# Swipe right: Next workspace (Super+])
action.right.keys = KEY_LEFTMETA, KEY_RIGHTBRACE
action.right.description = Swipe right: Next workspace (Super+])

# Swipe up: Volume up
action.up.keys = KEY_VOLUMEUP
action.up.description = Swipe up: Volume up

# Swipe down: Volume down
action.down.keys = KEY_VOLUMEDOWN
action.down.description = Swipe down: Volume down

# Diagonal gestures
# action.upleft.keys = KEY_LEFTCTRL, KEY_LEFT
# action.upleft.description = Swipe up-left: Ctrl+Left
# action.upright.keys = KEY_LEFTCTRL, KEY_RIGHT
# action.upright.description = Swipe up-right: Ctrl+Right

# ---------------------------------------------------------------------------
# [button.back] - BTN_BACK gestures
# ---------------------------------------------------------------------------
[button.back]
event_code = 0x116
motion_threshold = 40

action.tap.keys = KEY_LEFTMETA
action.tap.description = Tap: App launcher (Super)

action.left.keys = KEY_LEFTCTRL, KEY_PAGEUP
action.left.description = Swipe left: Previous tab (Ctrl+PgUp)

action.right.keys = KEY_LEFTCTRL, KEY_PAGEDOWN
action.right.description = Swipe right: Next tab (Ctrl+PgDown)

action.up.keys = KEY_BRIGHTNESSUP
action.up.description = Swipe up: Brightness up

action.down.keys = KEY_BRIGHTNESSDOWN
action.down.description = Swipe down: Brightness down

# ---------------------------------------------------------------------------
# [button.middle] - BTN_MIDDLE gestures
# ---------------------------------------------------------------------------
[button.middle]
event_code = 0x112
motion_threshold = 40

action.tap.keys = KEY_MUTE
action.tap.description = Tap: Mute toggle

action.up.keys = KEY_VOLUMEUP
action.up.description = Swipe up: Volume up

action.down.keys = KEY_VOLUMEDOWN
action.down.description = Swipe down: Volume down

# ---------------------------------------------------------------------------
# [button.extra] - BTN_EXTRA gestures
# ---------------------------------------------------------------------------
[button.extra]
event_code = 0x114
motion_threshold = 30

action.tap.keys = KEY_PLAYPAUSE
action.tap.description = Tap: Play/Pause media

action.left.keys = KEY_PREVIOUSSONG
action.left.description = Swipe left: Previous track

action.right.keys = KEY_NEXTSONG
action.right.description = Swipe right: Next track

action.up.keys = KEY_VOLUMEUP
action.up.description = Swipe up: Volume up

action.down.keys = KEY_VOLUMEDOWN
action.down.description = Swipe down: Volume down

# ---------------------------------------------------------------------------
# [button.side] - BTN_SIDE gestures (horizontal scroll wheel click)
# ---------------------------------------------------------------------------
[button.side]
event_code = 0x117
motion_threshold = 40

action.tap.keys = KEY_MUTE
action.tap.description = Tap: Mute/unmute

# ---------------------------------------------------------------------------
# [button.gesture] - BTN_TASK (thumb gesture button on some MX3 models)
# ---------------------------------------------------------------------------
[button.gesture]
event_code = 0x11a
motion_threshold = 50

action.tap.keys = KEY_LEFTMETA
action.tap.description = Tap: App launcher (Super)

action.left.keys = KEY_LEFTMETA, KEY_LEFTBRACE
action.left.description = Swipe left: Previous workspace (Super+[)

action.right.keys = KEY_LEFTMETA, KEY_RIGHTBRACE
action.right.description = Swipe right: Next workspace (Super+])

# ---------------------------------------------------------------------------
# Available KEY_* names for reference:
# ---------------------------------------------------------------------------
# Modifiers:   KEY_LEFTCTRL  KEY_RIGHTCTRL  KEY_LEFTSHIFT  KEY_RIGHTSHIFT
#              KEY_LEFTALT   KEY_RIGHTALT   KEY_LEFTMETA   KEY_RIGHTMETA
# Navigation:  KEY_LEFT  KEY_RIGHT  KEY_UP  KEY_DOWN
#              KEY_HOME  KEY_END  KEY_PAGEUP  KEY_PAGEDOWN
# Media:       KEY_MUTE  KEY_VOLUMEUP  KEY_VOLUMEDOWN  KEY_PLAYPAUSE
#              KEY_STOPCD  KEY_PREVIOUSSONG  KEY_NEXTSONG
# Brightness:  KEY_BRIGHTNESSUP  KEY_BRIGHTNESSDOWN
# F-keys:      KEY_F1 - KEY_F24
# Brackets:    KEY_LEFTBRACE  KEY_RIGHTBRACE  ([ and ])
# Letters:     KEY_A - KEY_Z
# Numbers:     KEY_0 - KEY_9
# ---------------------------------------------------------------------------
