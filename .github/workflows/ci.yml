name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential debhelper dh-sequence-systemd

      - name: Build
        run: make

      - name: Run tests
        run: make test

      - name: Validate packaging metadata
        run: make validate-packaging

      - name: Verify version metadata
        run: make verify-version

      - name: Build release artifacts
        run: make release-artifacts

      - name: Build Debian package
        run: dpkg-buildpackage -b -uc -us

  debug-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build debug target
        run: make debug
